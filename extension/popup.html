<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kevi - Sales Intelligence</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(to br, #f0fdf4, #ffffff);
      color: #1f2937;
    }

    .container {
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .logo {
      width: 24px;
      height: 24px;
      background: #10B981;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 12px;
    }

    .title {
      font-size: 14px;
      font-weight: 600;
    }

    .status {
      padding: 12px;
      background: #ecfdf5;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 12px;
      border-left: 3px solid #10B981;
    }

    .status.inactive {
      background: #fef3c7;
      border-left-color: #f59e0b;
    }

    .input-group {
      margin-bottom: 12px;
    }

    .input-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #6b7280;
    }

    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 12px;
      font-family: monospace;
    }

    input:focus {
      outline: none;
      border-color: #10B981;
      box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.1);
    }

    button {
      width: 100%;
      padding: 8px 12px;
      background: #10B981;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #059669;
    }

    button:disabled {
      background: #d1d5db;
      cursor: not-allowed;
    }

    .stats {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e5e7eb;
      font-size: 11px;
      color: #6b7280;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .link {
      display: inline-block;
      color: #10B981;
      text-decoration: none;
      font-size: 11px;
      margin-top: 8px;
    }

    .link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">K</div>
      <div class="title">Kevi</div>
    </div>

    <div class="status" id="status">
      <strong>Status:</strong> <span id="statusText">Loading...</span>
    </div>

    <div id="setupView" style="display: none;">
      <div class="input-group">
        <label for="token">Extension Token</label>
        <input type="password" id="token" placeholder="Paste your token here">
      </div>
      <button id="activateBtn">Activate Extension</button>
      <div style="margin-top: 8px; font-size: 11px; color: #6b7280;">
        Get your token from the Team Management page
      </div>
    </div>

    <div id="activeView" style="display: none;">
      <button id="deactivateBtn" style="background: #ef4444;">Deactivate</button>
      <div class="stats">
        <div class="stat-row">
          <span>Status:</span>
          <span style="color: #10B981; font-weight: 600;">Tracking</span>
        </div>
        <div class="stat-row">
          <span>Data Sync:</span>
          <span>Every 60s</span>
        </div>
      </div>
      <a href="https://kevi.io/dashboard" class="link" target="_blank">Go to Dashboard →</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
